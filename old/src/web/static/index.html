<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceLive Pro - Optimisé</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-animation { animation: pulse 1s infinite; }
        
        input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; width: 100%; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -8px; }
        input[type="range"]::-webkit-slider-runnable-track { height: 4px; background: #374151; border-radius: 2px; }
        input[type="range"]::-moz-range-thumb { height: 20px; width: 20px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: none; }
        input[type="range"]::-moz-range-track { height: 4px; background: #374151; border-radius: 2px; }
        
        .timeline-slider::-webkit-slider-thumb { height: 24px; width: 24px; margin-top: -10px; }
        .timeline-slider::-webkit-slider-runnable-track { height: 6px; }
        .timeline-slider::-moz-range-thumb { height: 24px; width: 24px; }
        .timeline-slider::-moz-range-track { height: 6px; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, useCallback, memo } = React;
        
        // Icônes SVG
        const PlayIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
        const PauseIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>);
        const StopIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"></rect></svg>);
        const VolumeIcon = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>);
        const MuteIcon = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>);
        const SquareIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="6" y="6" width="12" height="12"></rect></svg>);
        const CircleIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle></svg>);
        const SettingsIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v6m0 6v6m-9-9h6m6 0h6"></path></svg>);

        const formatTime = (seconds) => {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        };

        // COMPOSANT LevelMeter optimisé avec memo
        const LevelMeter = memo(({ level, label }) => (
            <div className="flex items-center gap-2">
                <span className="text-xs text-gray-400 w-12 font-mono">{label}</span>
                <div className="flex-1 h-6 bg-gray-800 rounded overflow-hidden relative border border-gray-700">
                    <div className={`h-full transition-all duration-75 ${level > 90 ? 'bg-red-500' : level > 70 ? 'bg-yellow-500' : 'bg-green-500'}`} style={{ width: `${Math.min(level, 100)}%` }} />
                    <div className="absolute inset-0 flex items-center justify-center">
                        <span className="text-xs font-mono text-white drop-shadow font-bold">{level.toFixed(0)}%</span>
                    </div>
                </div>
            </div>
        ));

        // COMPOSANT EffectPanel optimisé avec memo
        const EffectPanel = memo(({ name, title, enabled, parameters, onToggle, onParameterChange }) => {
            const handleToggle = useCallback((e) => {
                e.preventDefault();
                e.stopPropagation();
                onToggle(name);
            }, [name, onToggle]);
            
            return (
                <div className={`bg-gray-800 rounded-lg p-4 border-2 transition-all ${enabled ? 'border-blue-500 shadow-lg shadow-blue-500/20' : 'border-gray-700'}`}>
                    <div className="flex items-center justify-between mb-3">
                        <h3 className="font-semibold text-white pointer-events-none">{title}</h3>
                        <button 
                            type="button"
                            onMouseDown={handleToggle} 
                            className={`px-4 py-1.5 rounded text-sm font-medium transition-all ${enabled ? 'bg-blue-500 text-white hover:bg-blue-600 shadow-lg' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}
                        >
                            <span className="pointer-events-none">{enabled ? 'ON' : 'OFF'}</span>
                        </button>
                    </div>
                    {enabled && (
                        <div className="space-y-3">
                            {Object.entries(parameters).map(([key, value]) => {
                                if (key === 'enabled') return null;
                                return (
                                    <div key={key} className="space-y-1">
                                        <div className="flex justify-between text-xs">
                                            <span className="text-gray-400 capitalize">{key.replace('_', ' ')}</span>
                                            <span className="text-white font-mono font-bold">{value.toFixed(2)}</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min="0" 
                                            max="1" 
                                            step="0.01" 
                                            value={value} 
                                            onChange={(e) => onParameterChange(name, key, e.target.value)} 
                                            className="w-full" 
                                        />
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        });

        // COMPOSANT TrackPanel optimisé avec memo et comparaison personnalisée
        const TrackPanel = memo(({ index, state, isActive, onSelectTrack, onCommand }) => {

            const fileInputRef = useRef(null);
            const [showEditor, setShowEditor] = useState(false); 
            const progress = state.duration > 0 ? (state.current_time / state.duration) * 100 : 0;
            
            // État local pour le gain
            const [localGain, setLocalGain] = useState(state.gain);
            
            // Synchroniser avec le state du serveur
            useEffect(() => {
                setLocalGain(state.gain);
            }, [state.gain]);
            
            // ========== TOUS LES HANDLERS DÉFINIS ICI ==========
            const handleTrackSelect = useCallback((e) => {
                e.preventDefault();
                e.stopPropagation();
                onSelectTrack(index);
            }, [index, onSelectTrack]);
            
            const handleImportAudio = useCallback(async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const formData = new FormData();
                formData.append('file', file);
                formData.append('track', index);
                
                try {
                    const response = await fetch('http://localhost:5000/api/upload_audio', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    if (!response.ok) {
                        throw new Error(result.error || 'Erreur upload');
                    }
                    
                    console.log(`✅ Fichier importé dans piste ${index + 1}:`, file.name);
                } catch (error) {
                    console.error('Erreur import:', error);
                    alert('Erreur import: ' + error.message);
                }
            }, [index]);
            
            const handleMuteToggle = useCallback((e) => {
                e.preventDefault();
                e.stopPropagation();
                onCommand('toggle_track_mute', index);
            }, [index, onCommand]);
            
            const handleSeek = useCallback((e) => {
                if (state.duration > 0) {
                    const newPosition = parseFloat(e.target.value);
                    onCommand('seek_track', index, newPosition);
                }
            }, [state.duration, index, onCommand]);
            
            const handleGainChange = useCallback((e) => {
                const newGain = parseFloat(e.target.value);
                setLocalGain(newGain);
                onCommand('set_track_gain', index, null, newGain);
            }, [index, onCommand]);
            
            const handlePlay = useCallback((e) => {
                e.preventDefault();
                e.stopPropagation();
                onCommand('play_track', index);
            }, [index, onCommand]);
            
            const handlePause = useCallback((e) => {
                e.preventDefault();
                e.stopPropagation();
                onCommand('pause_track', index);
            }, [index, onCommand]);
            
            const handleStop = useCallback((e) => {
                e.preventDefault();
                e.stopPropagation();
                onCommand('stop_track', index);
            }, [index, onCommand]);
            
            const handleClear = useCallback((e) => {
                e.preventDefault();
                e.stopPropagation();
                onCommand('clear_track', index);
            }, [index, onCommand]);
            
            // ========== UN SEUL RETURN AVEC LE JSX COMPLET ==========
            return (
                <div className={`bg-gray-800 rounded-lg p-4 border-2 transition-all hover:shadow-lg ${isActive ? 'border-blue-500 shadow-lg shadow-blue-500/20' : 'border-gray-700 hover:border-gray-600'}`}>
                    <div onMouseDown={handleTrackSelect} className="cursor-pointer mb-3 select-none">
                        <div className="flex items-center justify-between">
                            <h3 className="font-semibold text-white pointer-events-none">Piste {index + 1}</h3>
                            <div className="flex items-center gap-2 pointer-events-none">
                                {isActive && <span className="text-blue-400 text-sm font-bold">👉</span>}
                                <button
                                    type="button"
                                    onMouseDown={handleMuteToggle}
                                    className={`p-1.5 rounded transition-colors pointer-events-auto ${state.muted ? 'bg-red-600 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}
                                    title={state.muted ? 'Unmute' : 'Mute'}
                                >
                                    <span className="pointer-events-none flex items-center justify-center">
                                        {state.muted ? <MuteIcon /> : <VolumeIcon />}
                                    </span>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    {state.duration > 0 && (
                        <div className="mb-3">
                            <div className="flex justify-between text-xs text-gray-400 mb-1">
                                <span className="font-mono">{formatTime(state.current_time || 0)}</span>
                                <span className="font-mono">{formatTime(state.duration)}</span>
                            </div>
                            {/* ✅ NOUVELLE VISUALISATION WAVEFORM */}
                            <MiniWaveform
                                trackIndex={index}
                                duration={state.duration}
                                currentTime={state.current_time || 0}
                                onSeek={(newTime) => onCommand('seek_track', index, newTime)}
                            />
                        </div>
                    )}
                    
                    <div className="flex gap-2 flex-wrap text-xs mb-3">
                        {state.recording && <span className="px-2 py-1 bg-red-500 rounded text-white font-bold pulse-animation">🔴 REC</span>}
                        {state.playing && !state.paused && <span className="px-2 py-1 bg-green-500 rounded text-white font-bold">▶️ PLAY</span>}
                        {state.paused && <span className="px-2 py-1 bg-yellow-500 rounded text-white font-bold">⏸️ PAUSE</span>}
                        {state.overdubbing && <span className="px-2 py-1 bg-orange-500 rounded text-white font-bold pulse-animation">🟠 OVER</span>}
                        {state.muted && <span className="px-2 py-1 bg-red-700 rounded text-white font-bold">🔇 MUTE</span>}
                        {!state.recording && !state.playing && !state.paused && !state.overdubbing && state.duration === 0 && <span className="px-2 py-1 bg-gray-700 rounded text-gray-500">⚪ Vide</span>}
                    </div>
                    
                    <div className="mb-3 bg-gray-900/50 rounded p-2">
                        <div className="flex justify-between text-xs text-gray-400 mb-1">
                            <span className="flex items-center gap-1"><VolumeIcon /> Volume</span>
                            <span className="font-mono font-bold text-white">{Math.round(localGain * 100)}%</span>
                        </div>
                        <input
                            type="range"
                            min="0"
                            max="2"
                            step="0.01"
                            value={localGain}
                            onChange={handleGainChange}
                            className="w-full"
                        />
                    </div>
                    {/* ✅ NOUVEAU : AJOUTER ICI, JUSTE APRÈS LE VOLUME */}
                    <div className="mb-3 bg-gray-900/50 rounded p-2">
                        <label className="flex items-center gap-2 cursor-pointer">
                            <input
                                type="checkbox"
                                checked={state.loop_on_export !== false}
                                onChange={() => onCommand('toggle_track_loop_export', index)}
                                className="w-4 h-4"
                            />
                            <span className="text-sm text-white">🔁 Loop à l'export</span>
                        </label>
                        <p className="text-xs text-gray-500 mt-1">
                            Répète cette piste en boucle lors de l'export
                        </p>
                    </div>
                    
                    <div className="grid grid-cols-4 gap-2 mb-3">
                        <button
                            type="button"
                            onMouseDown={handlePlay}
                            disabled={state.duration === 0 || state.recording}
                            className={`p-2 rounded transition-colors flex items-center justify-center ${
                                state.playing && !state.paused 
                                    ? 'bg-green-600 text-white' 
                                    : 'bg-gray-700 hover:bg-gray-600 text-white disabled:bg-gray-800 disabled:text-gray-600'
                            }`}
                            title="Play"
                        >
                            <span className="pointer-events-none"><PlayIcon /></span>
                        </button>
                        
                        <button
                            type="button"
                            onMouseDown={handlePause}
                            disabled={state.duration === 0 || state.recording || !state.playing}
                            className={`p-2 rounded transition-colors flex items-center justify-center ${
                                state.paused 
                                    ? 'bg-yellow-600 text-white' 
                                    : 'bg-gray-700 hover:bg-gray-600 text-white disabled:bg-gray-800 disabled:text-gray-600'
                            }`}
                            title="Pause"
                        >
                            <span className="pointer-events-none"><PauseIcon /></span>
                        </button>
                        
                        <button
                            type="button"
                            onMouseDown={handleStop}
                            disabled={state.duration === 0 || state.recording}
                            className="p-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 text-white rounded transition-colors flex items-center justify-center"
                            title="Stop"
                        >
                            <span className="pointer-events-none"><StopIcon /></span>
                        </button>
                        
                        <button
                            type="button"
                            onMouseDown={handleClear}
                            disabled={state.duration === 0}
                            className="p-2 bg-red-600 hover:bg-red-700 disabled:bg-gray-800 disabled:text-gray-600 text-white rounded transition-colors text-xs font-medium"
                            title="Clear"
                        >
                            <span className="pointer-events-none">🗑️</span>
                        </button>
                    </div>
                    
                    {/* Boutons d'import et édition */}
                    <div className="grid grid-cols-2 gap-2">
                        <div>
                            <input
                                ref={fileInputRef}
                                type="file"
                                accept=".wav,.flac"
                                onChange={handleImportAudio}
                                className="hidden"
                            />
                            <button
                                type="button"
                                onMouseDown={(e) => {
                                    e.preventDefault();
                                    fileInputRef.current?.click();
                                }}
                                className="w-full p-2 bg-purple-600 hover:bg-purple-700 text-white rounded transition-colors text-sm font-medium flex items-center justify-center gap-2"
                            >
                                <span className="pointer-events-none">📁 Import</span>
                            </button>
                        </div>
                        <button
                            type="button"
                            onClick={() => setShowEditor(true)}
                            disabled={state.duration === 0}
                            className="w-full p-2 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-700 disabled:text-gray-500 text-white rounded transition-colors text-sm font-medium"
                        >
                            ✂️ Éditer
                        </button>
                    </div>

                    {showEditor && (
                        <WaveformEditor
                            track={state}
                            trackIndex={index}
                            onClose={() => setShowEditor(false)}
                            onApply={() => setShowEditor(false)}
                        />
                    )}
                </div>
            );
        }, (prevProps, nextProps) => {
            const prevState = prevProps.state;
            const nextState = nextProps.state;
            
            const timeDiff = Math.abs((prevState.current_time || 0) - (nextState.current_time || 0));
            const shouldSkipTimeUpdate = timeDiff < 0.1;
            
            return (
                prevProps.index === nextProps.index &&
                prevProps.isActive === nextProps.isActive &&
                prevState.recording === nextState.recording &&
                prevState.playing === nextState.playing &&
                prevState.paused === nextState.paused &&
                prevState.overdubbing === nextState.overdubbing &&
                prevState.muted === nextState.muted &&
                prevState.duration === nextState.duration &&
                Math.abs(prevState.gain - nextState.gain) < 0.01 &&
                shouldSkipTimeUpdate
            );
        });
        const MiniWaveform = memo(({ trackIndex, duration, currentTime, onSeek }) => {
            const canvasRef = useRef(null);
            const [waveformData, setWaveformData] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            
            // ✅ useCallback pour éviter de recréer la fonction
            const loadWaveform = useCallback(async () => {
                try {
                    setIsLoading(true);
                    const response = await fetch(`http://localhost:5000/api/waveform/${trackIndex}?samples_per_pixel=256`);
                    const data = await response.json();
                    setWaveformData(data.waveform);
                    setIsLoading(false);
                } catch (error) {
                    console.error('Erreur chargement waveform:', error);
                    setIsLoading(false);
                }
            }, [trackIndex]);
            
            // Charger la waveform seulement si duration change
            useEffect(() => {
                if (duration > 0) {
                    loadWaveform();
                } else {
                    setWaveformData([]);
                    setIsLoading(false);
                }
            }, [duration, loadWaveform]);
            
            // ✅ useCallback pour drawWaveform
            const drawWaveform = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                const centerY = height / 2;
                
                // Fond
                ctx.fillStyle = '#1f2937';
                ctx.fillRect(0, 0, width, height);
                
                const pixelWidth = width / waveformData.length;
                const progress = duration > 0 ? currentTime / duration : 0;
                
                // Dessiner la waveform
                waveformData.forEach((point, i) => {
                    const x = i * pixelWidth;
                    const minY = centerY - (point.min * centerY * 0.9);
                    const maxY = centerY - (point.max * centerY * 0.9);
                    const h = maxY - minY;
                    
                    // Couleur : bleu pour la partie jouée, gris pour le reste
                    const pixelProgress = i / waveformData.length;
                    ctx.fillStyle = pixelProgress <= progress ? '#3b82f6' : '#4b5563';
                    ctx.fillRect(x, minY, Math.max(pixelWidth, 1), h || 1);
                });
                
                // Ligne de position actuelle
                const posX = progress * width;
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(posX, 0);
                ctx.lineTo(posX, height);
                ctx.stroke();
            }, [waveformData, duration, currentTime]);
            
            // Dessiner seulement quand nécessaire
            useEffect(() => {
                if (waveformData.length > 0 && canvasRef.current) {
                    drawWaveform();
                }
            }, [waveformData, drawWaveform]);
            
            const handleClick = useCallback((e) => {
                if (duration === 0 || !canvasRef.current) return;
                
                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const clickProgress = x / rect.width;
                const newTime = clickProgress * duration;
                
                onSeek(newTime);
            }, [duration, onSeek]);
            
            if (duration === 0) {
                return (
                    <div className="h-16 bg-gray-900/50 rounded flex items-center justify-center border border-gray-700">
                        <span className="text-xs text-gray-500">Pas d'audio</span>
                    </div>
                );
            }
            
            if (isLoading) {
                return (
                    <div className="h-16 bg-gray-900/50 rounded flex items-center justify-center border border-gray-700">
                        <span className="text-xs text-gray-400">Chargement...</span>
                    </div>
                );
            }
            
            return (
                <div className="relative">
                    <canvas
                        ref={canvasRef}
                        width={400}
                        height={64}
                        onClick={handleClick}
                        className="w-full h-16 rounded cursor-pointer border border-gray-700 hover:border-blue-500 transition-colors"
                        style={{ display: 'block' }}
                    />
                </div>
            );
        }, (prevProps, nextProps) => {
            // ✅ Fonction de comparaison personnalisée
            // Ne re-render que si vraiment nécessaire
            const timeDiff = Math.abs(prevProps.currentTime - nextProps.currentTime);
            
            return (
                prevProps.trackIndex === nextProps.trackIndex &&
                prevProps.duration === nextProps.duration &&
                timeDiff < 0.1  // Éviter de redessiner pour des micro-changements
            );
        });
        const WaveformEditor = memo(({ track, trackIndex, onClose, onApply }) => {
            const canvasRef = useRef(null);
            const [waveformData, setWaveformData] = useState([]);
            const [duration, setDuration] = useState(0);
            const [startTime, setStartTime] = useState(0);
            const [endTime, setEndTime] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const audioRef = useRef(null);
            
            useEffect(() => {
                loadWaveform();
            }, [trackIndex]);
            
            const loadWaveform = async () => {
                try {
                    const response = await fetch(`http://localhost:5000/api/waveform/${trackIndex}?samples_per_pixel=512`);
                    const data = await response.json();
                    setWaveformData(data.waveform);
                    setDuration(data.duration);
                    setEndTime(data.duration);
                    drawWaveform(data.waveform, data.duration);
                } catch (error) {
                    console.error('Erreur chargement waveform:', error);
                }
            };
            
            const drawWaveform = (waveform, dur) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                const centerY = height / 2;
                
                ctx.fillStyle = '#1f2937';
                ctx.fillRect(0, 0, width, height);
                
                const pixelWidth = width / waveform.length;
                
                // Dessiner la forme d'onde
                ctx.fillStyle = '#3b82f6';
                waveform.forEach((point, i) => {
                    const x = i * pixelWidth;
                    const minY = centerY - (point.min * centerY);
                    const maxY = centerY - (point.max * centerY);
                    const h = maxY - minY;
                    ctx.fillRect(x, minY, pixelWidth, h);
                });
                
                // Zones de trim (semi-transparentes)
                const startX = (startTime / dur) * width;
                const endX = (endTime / dur) * width;
                
                ctx.fillStyle = 'rgba(239, 68, 68, 0.3)';
                ctx.fillRect(0, 0, startX, height); // Zone début à supprimer
                ctx.fillRect(endX, 0, width - endX, height); // Zone fin à supprimer
                
                // Lignes de délimitation
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(startX, 0);
                ctx.lineTo(startX, height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(endX, 0);
                ctx.lineTo(endX, height);
                ctx.stroke();
            };
            
            useEffect(() => {
                if (waveformData.length > 0) {
                    drawWaveform(waveformData, duration);
                }
            }, [startTime, endTime, waveformData]);
            
            const handleCanvasClick = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const clickTime = (x / canvas.width) * duration;
                
                // Clic plus proche du début ou de la fin?
                const distToStart = Math.abs(clickTime - startTime);
                const distToEnd = Math.abs(clickTime - endTime);
                
                if (distToStart < distToEnd) {
                    setStartTime(Math.max(0, Math.min(clickTime, endTime - 0.1)));
                } else {
                    setEndTime(Math.max(startTime + 0.1, Math.min(clickTime, duration)));
                }

                        body: JSON.stringify({ start_time: startTime, end_time: endTime })
                    });
                    
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    
                    if (audioRef.current) {
                        audioRef.current.src = url;
                        audioRef.current.play();
                        setIsPlaying(true);
                    }
                } catch (error) {
                    console.error('Erreur preview:', error);
                }
            };

                                    </div>
                                    <input
                                        type="range"
                                        min="-60"
                                        max="0"
                                        step="0.5"
                                        value={params.threshold}
                                        onChange={(e) => onParamChange('compressor', 'threshold', parseFloat(e.target.value))}
                                        className="w-full"
                                    />
                                </div>
                                
                                <div className="space-y-1">
                                    <div className="flex justify-between text-xs">
                                        <span className="text-gray-400">Ratio</span>
                                        <span className="text-white font-mono font-bold">{params.ratio.toFixed(1)}:1</span>
                                    </div>
                                    <input
                                        type="range"
                                        min="1"
                                        max="20"
                                        step="0.1"
                                        value={params.ratio}
                                        onChange={(e) => onParamChange('compressor', 'ratio', parseFloat(e.target.value))}
                                        className="w-full"
                                    />
                                </div>
                                
                                <div className="space-y-1">
                                    <div className="flex justify-between text-xs">
                                        <span className="text-gray-400">Attack</span>
                                        <span className="text-white font-mono font-bold">{params.attack.toFixed(1)} ms</span>
                                    </div>
                                    <input
                                        type="range"
                                        min="0.1"
                                        max="100"
                                        step="0.1"
                                        value={params.attack}
                                        onChange={(e) => onParamChange('compressor', 'attack', parseFloat(e.target.value))}
                                        className="w-full"
                                    />
                                </div>
                                
                                <div className="space-y-1">
                                    <div className="flex justify-between text-xs">
                                        <span className="text-gray-400">Release</span>
                                        <span className="text-white font-mono font-bold">{params.release.toFixed(0)} ms</span>
                                    </div>
                                    <input
                                        type="range"
                                        min="10"
                                        max="1000"
                                        step="1"
                                        value={params.release}
                                        onChange={(e) => onParamChange('compressor', 'release', parseFloat(e.target.value))}
                                        className="w-full"
                                    />
                                </div>
                                
                                <div className="space-y-1">
                                    <div className="flex justify-between text-xs">
                                        <span className="text-gray-400">Knee</span>
                                        <span className="text-white font-mono font-bold">{params.knee.toFixed(1)} dB</span>
                                    </div>
                                    <input
                                        type="range"
                                        min="0"
                                        max="10"
                                        step="0.1"
                                        value={params.knee}
                                        onChange={(e) => onParamChange('compressor', 'knee', parseFloat(e.target.value))}
                                        className="w-full"
                                    />
                                </div>
                                
                                <div className="space-y-1">
                                    <div className="flex justify-between text-xs">
                                        <span className="text-gray-400">Makeup Gain</span>
                                        <span className="text-white font-mono font-bold">{params.makeup_gain.toFixed(1)} dB</span>
                                    </div>
                                    <input
                                        type="range"
                                        min="0"
                                        max="24"
                                        step="0.1"
                                        value={params.makeup_gain}
                                        onChange={(e) => onParamChange('compressor', 'makeup_gain', parseFloat(e.target.value))}
                                        className="w-full"
                                    />
                                </div>
                            </div>
                        )}
                    </div>
                );
            });

            // COMPOSANT LimiterPanel
            const LimiterPanel = memo(({ enabled, params, onToggle, onParamChange }) => {
                return (
                    <div className={`bg-gray-800 rounded-lg p-4 border-2 transition-all ${enabled ? 'border-red-500 shadow-lg shadow-red-500/20' : 'border-gray-700'}`}>
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="font-bold text-white flex items-center gap-2">
                                <span>🛡️</span> Limiteur
                            </h3>
                            <button
                                type="button"
                                onMouseDown={(e) => { e.preventDefault(); onToggle('limiter'); }}
                                className={`px-4 py-1.5 rounded text-sm font-medium transition-all ${enabled ? 'bg-red-500 text-white hover:bg-red-600' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}
                            >
                                <span className="pointer-events-none">{enabled ? 'ON' : 'OFF'}</span>
                            </button>
                        </div>
                        
                        {enabled && (
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1">
                                    <div className="flex justify-between text-xs">
                                        <span className="text-gray-400">Ceiling</span>
                                        <span className="text-white font-mono font-bold">{params.threshold.toFixed(1)} dB</span>
                                    </div>
                                    <input
                                        type="range"
                                        min="-12"
                                        max="0"
                                        step="0.1"
                                        value={params.threshold}
                                        onChange={(e) => onParamChange('limiter', 'threshold', parseFloat(e.target.value))}
                                        className="w-full"
                                    />
                                </div>
                                
                                <div className="space-y-1">
                                    <div className="flex justify-between text-xs">
                                        <span className="text-gray-400">Release</span>
                                        <span className="text-white font-mono font-bold">{params.release.toFixed(0)} ms</span>
                                    </div>
                                    <input
                                        type="range"
                                        min="10"
                                        max="500"
                                        step="1"
                                        value={params.release}
                                        onChange={(e) => onParamChange('limiter', 'release', parseFloat(e.target.value))}
                                        className="w-full"
                                    />
                                </div>
                            </div>
                        )}
                    </div>
                );
            });

            // COMPOSANT PRINCIPAL MasteringSection
            const MasteringSection = memo(({ masteringState, onToggle, onParamChange }) => {
                return (
                    <div className="bg-gradient-to-br from-gray-800 to-gray-900 rounded-xl shadow-xl p-6 border-2 border-gray-700">
                        <div className="mb-6">
                            <h2 className="text-2xl font-bold text-white mb-2 flex items-center gap-2">
                                <span>🎛️</span> Mastering Chain
                            </h2>
                            <p className="text-sm text-gray-400">Traitement professionnel de la sortie audio</p>
                        </div>
                        
                        <div className="space-y-4">
                            <EQPanel
                                enabled={masteringState.eq_enabled}
                                params={masteringState.eq_params}
                                onToggle={onToggle}
                                onParamChange={onParamChange}
                            />
                            
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                <CompressorPanel
                                    enabled={masteringState.compressor_enabled}
                                    params={masteringState.compressor_params}
                                    onToggle={onToggle}
                                    onParamChange={onParamChange}
                                />
                                
                                <LimiterPanel
                                    enabled={masteringState.limiter_enabled}
                                    params={masteringState.limiter_params}
                                    onToggle={onToggle}
                                    onParamChange={onParamChange}
                                />
                            </div>
                        </div>
                    </div>
                );
            });
            const handleSelectTrack = useCallback((index) => {
                console.log('🎵 Sélection piste', index + 1);
                handleLooperCommand('set_track', index);
            }, [handleLooperCommand]);

            const exportMix = useCallback(async (format = 'wav') => {
                setIsExporting(true);
                try {
                    const response = await fetch('http://localhost:5000/api/export', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ format: format, normalize: true })
                    });
                    
                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error || 'Erreur export');
                    }
                    
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `voicelive_export_${Date.now()}.${format}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    
                    console.log('✅ Export terminé:', format);
                } catch (error) {
                    console.error('Erreur export:', error);
                    alert('Erreur export: ' + error.message);
                } finally {
                    setIsExporting(false);
                }
            }, []);

            if (showDeviceSetup && !isRunning) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-gray-900 to-gray-800 p-8">
                        <div className="max-w-2xl mx-auto">
                            <div className="bg-gray-800 rounded-xl shadow-2xl p-8 border border-gray-700">
                                <div className="text-center mb-8">
                                    <h1 className="text-4xl font-bold text-white mb-2">🎸 VoiceLive Pro</h1>
                                    <p className="text-gray-400">Configuration Audio</p>
                                    <div className="mt-4">
                                        <span className={`inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ${isConnected ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                                            <span className={`w-2 h-2 rounded-full mr-2 ${isConnected ? 'bg-green-400 pulse-animation' : 'bg-red-400'}`} />
                                            {isConnected ? 'Connecté' : 'Déconnecté'}
                                        </span>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-2">🎤 Périphérique d'entrée</label>
                                        <select value={selectedInput || ''} onChange={(e) => setSelectedInput(parseInt(e.target.value))} className="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-3">
                                            <option value="">Sélectionner...</option>
                                            {devices.filter(d => d.inputs > 0).map(dev => (
                                                <option key={dev.id} value={dev.id}>{dev.driver_type === 'ASIO' ? '⭐ ' : ''}{dev.name} ({dev.inputs} entrées)</option>
                                            ))}
                                        </select>
                                        <p className="mt-1 text-xs text-gray-400">⭐ = ASIO (faible latence)</p>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-2">🔊 Périphérique de sortie</label>
                                        <select value={selectedOutput || ''} onChange={(e) => setSelectedOutput(parseInt(e.target.value))} className="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-3">
                                            <option value="">Sélectionner...</option>
                                            {devices.filter(d => d.outputs > 0).map(dev => (
                                                <option key={dev.id} value={dev.id}>{dev.driver_type === 'ASIO' ? '⭐ ' : ''}{dev.name} ({dev.outputs} sorties)</option>
                                            ))}
                                        </select>
                                        <p className="mt-1 text-xs text-gray-400">⚠️ Même type de driver pour entrée et sortie!</p>
                                    </div>
                                    <button 
                                        type="button"
                                        onMouseDown={(e) => { e.preventDefault(); startAudio(); }}
                                        disabled={!selectedInput || !selectedOutput || !isConnected} 
                                        className="w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 disabled:from-gray-600 disabled:to-gray-700 text-white font-semibold py-4 px-6 rounded-lg transition-all transform hover:scale-105 disabled:scale-100 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-lg"
                                    >
                                        <span className="pointer-events-none flex items-center gap-2">
                                            <PlayIcon /><span>Démarrer le système audio</span>
                                        </span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-900 to-gray-800 p-4">
                    <div className="max-w-7xl mx-auto">
                        <div className="bg-gray-800 rounded-xl shadow-xl p-6 mb-4 border border-gray-700">
                            <div className="flex items-center justify-between">
                                <div>
                                    <h1 className="text-3xl font-bold text-white mb-1">🎸 VoiceLive Pro</h1>
                                    <p className="text-gray-400 text-sm">Contrôles avancés - Version optimisée</p>
                                </div>
                                <div className="flex gap-4">
                                    <button 
                                        type="button"
                                        onMouseDown={(e) => { e.preventDefault(); stopAudio(); setShowDeviceSetup(true); }}
                                        className="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition-colors flex items-center gap-2"
                                    >
                                        <span className="pointer-events-none flex items-center gap-2">
                                            <SettingsIcon /><span>Config</span>
                                        </span>
                                    </button>
                                    <button 
                                        type="button"
                                        onMouseDown={(e) => { e.preventDefault(); stopAudio(); }}
                                        className="px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors flex items-center gap-2 font-semibold shadow-lg"
                                    >
                                        <span className="pointer-events-none flex items-center gap-2">
                                            <SquareIcon /><span>Arrêter</span>
                                        </span>
                                    </button>
                                </div>
                                <div className="flex gap-2">
                                    <button 
                                        onMouseDown={handleUndo} 
                                        disabled={!undoRedoState.can_undo}
                                        className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800"
                                    >
                                        ↶ Undo
                                    </button>
                                    <button 
                                        onMouseDown={handleRedo}
                                        disabled={!undoRedoState.can_redo}
                                        className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800"
                                    >
                                        ↷ Redo
                                    </button>
                                </div>
                            </div>
                            <div className="mt-6 space-y-2">
                                <LevelMeter level={inputLevel} label="IN" />
                                <LevelMeter level={outputLevel} label="OUT" />
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
                            <div className="space-y-4">
                                <h2 className="text-xl font-bold text-white flex items-center gap-2">🎤 Effets Vocaux</h2>
                                <EffectPanel 
                                    name="harmony" 
                                    title="Harmony" 
                                    enabled={effects.harmony.enabled} 
                                    parameters={effects.harmony}
                                    onToggle={handleToggleEffect}
                                    onParameterChange={handleParameterUpdate}
                                />
                                <EffectPanel 
                                    name="reverb" 
                                    title="Reverb Pro" 
                                    enabled={effects.reverb.enabled} 
                                    parameters={effects.reverb}
                                    onToggle={handleToggleEffect}
                                    onParameterChange={handleParameterUpdate}
                                />
                            </div>
                            <div className="space-y-4">
                                <h2 className="text-xl font-bold text-white flex items-center gap-2">🎸 Effets Guitare</h2>
                                <EffectPanel 
                                    name="wah" 
                                    title="Wah" 
                                    enabled={effects.wah.enabled} 
                                    parameters={effects.wah}
                                    onToggle={handleToggleEffect}
                                    onParameterChange={handleParameterUpdate}
                                />
                                <EffectPanel 
                                    name="chorus" 
                                    title="Chorus" 
                                    enabled={effects.chorus.enabled} 
                                    parameters={effects.chorus}
                                    onToggle={handleToggleEffect}
                                    onParameterChange={handleParameterUpdate}
                                />
                            </div>
                        </div>

                        <div className="bg-gray-800 rounded-xl shadow-xl p-6 border border-gray-700 mb-4">
                            <h2 className="text-2xl font-bold text-white mb-4">🔄 Looper 3 Pistes</h2>
                            {/* ✅ NOUVEAU : Contrôleur global */}
                            <GlobalTrackController 
                                looperStates={looperStates}
                                onCommand={handleLooperCommand}
                            />
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                {looperStates.map((state, index) => (
                                    <TrackPanel 
                                        key={index} 
                                        index={index} 
                                        state={state}
                                        isActive={index === activeTrack}
                                        onSelectTrack={handleSelectTrack}
                                        onCommand={handleLooperCommand}
                                    />
                                ))}
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                                <button 
                                    type="button"
                                    onMouseDown={(e) => { e.preventDefault(); handleLooperCommand('record_stop'); }}
                                    className="px-6 py-3 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-all font-semibold flex items-center justify-center gap-2 shadow-lg"
                                >
                                    <span className="pointer-events-none flex items-center gap-2">
                                        <CircleIcon /><span>Record/Stop</span>
                                    </span>
                                </button>
                                <button 
                                    type="button"
                                    onMouseDown={(e) => { 
                                        e.preventDefault(); 
                                        const track = looperStates[activeTrack]; 
                                        if (track.playing || track.recording) handleLooperCommand('record_stop'); 
                                    }} 
                                    disabled={!looperStates[activeTrack].playing && !looperStates[activeTrack].recording} 
                                    className="px-6 py-3 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 text-white rounded-lg transition-all font-semibold flex items-center justify-center gap-2 shadow-lg"
                                >
                                    <span className="pointer-events-none flex items-center gap-2">
                                        <SquareIcon /><span>Stop</span>
                                    </span>
                                </button>
                                <button 
                                    type="button"
                                    onMouseDown={(e) => { e.preventDefault(); handleLooperCommand('overdub'); }}
                                    className="px-6 py-3 bg-orange-600 hover:bg-orange-700 text-white rounded-lg transition-all font-semibold shadow-lg"
                                >
                                    <span className="pointer-events-none">🟠 Overdub</span>
                                </button>
                                <button 
                                    type="button"
                                    onMouseDown={(e) => { e.preventDefault(); handleLooperCommand('clear_track'); }}
                                    className="px-6 py-3 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition-all font-semibold shadow-lg"
                                >
                                    <span className="pointer-events-none">🗑️ Clear Piste</span>
                                </button>
                                <button 
                                    type="button"
                                    onMouseDown={(e) => { e.preventDefault(); handleLooperCommand('clear_all'); }}
                                    className="px-6 py-3 bg-red-700 hover:bg-red-800 text-white rounded-lg transition-all font-semibold shadow-lg"
                                >
                                    <span className="pointer-events-none">🗑️ Clear Tout</span>
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                            <SyncPanel 
                                syncInfo={syncInfo} 
                                looperStates={looperStates}
                                onCommand={handleLooperCommand}
                            />
                            <div className="p-4 bg-gray-900/50 rounded-lg border border-gray-700">
                                <h3 className="text-sm font-bold text-white mb-3">Export Audio</h3>
                                <div className="flex gap-3">
                                    <button 
                                        type="button"
                                        onMouseDown={(e) => { e.preventDefault(); exportMix('wav'); }}
                                        disabled={isExporting || looperStates.every(s => s.duration === 0)} 
                                        className="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-700 disabled:text-gray-500 text-white rounded-lg transition-colors font-medium"
                                    >
                                        <span className="pointer-events-none">
                                            {isExporting ? 'Export en cours...' : 'Exporter WAV'}
                                        </span>
                                    </button>
                                    <button 
                                        type="button"
                                        onMouseDown={(e) => { e.preventDefault(); exportMix('flac'); }}
                                        disabled={isExporting || looperStates.every(s => s.duration === 0)} 
                                        className="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-700 disabled:text-gray-500 text-white rounded-lg transition-colors font-medium"
                                    >
                                        <span className="pointer-events-none">
                                            {isExporting ? 'Export en cours...' : 'Exporter FLAC'}
                                        </span>
                                    </button>
                                </div>
                                <p className="text-xs text-gray-400 mt-2">Normalisation auto -1dB. WAV = max qualité, FLAC = compression sans perte.</p>
                            </div>
                        </div>
                    </div>
                    <div className="mb-4">
                        <MetronomePanel
                            metronomeState={metronomeState}
                            onCommand={handleMetronomeCommand}
                            onParamChange={handleMetronomeParamChange}
                        />
                    </div>
                    {/* Accordeur */}
                    <div className="mb-4">
                        <GuitarTunerPanel tunerState={tunerState} onCommand={handleTunerCommand} />
                    </div>
                    <div className="mt-4">
                        <MasteringSection
                            masteringState={masteringState}
                            onToggle={handleMasteringToggle}
                            onParamChange={handleMasteringParamChange}
                        />
                    </div>
                </div>
                
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(VoiceLiveProInterface));
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
