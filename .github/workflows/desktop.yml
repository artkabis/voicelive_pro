# SPDX-License-Identifier: MIT
# Build de l'application desktop JUCE (Linux) — isolé du CI du cœur pour ne pas
# polluer son signal. Publie l'exécutable en artefact.
name: App desktop

on:
  workflow_dispatch:
  push:
    branches: ["claude/audio-recording-app-feasibility-g7nde9"]
    paths:
      - "app/**"
      - "core/**"
      - "dsp/**"
      - "engine/**"
      - "CMakeLists.txt"
      - ".github/workflows/desktop.yml"

jobs:
  build:
    name: App desktop (JUCE, Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Dépendances système JUCE
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev \
            libxrender-dev libgl1-mesa-dev libglu1-mesa-dev mesa-common-dev
      - name: Configurer (app ON, tests OFF)
        run: cmake -S . -B build -DVOICELIVE_BUILD_APP=ON -DVOICELIVE_BUILD_TESTS=OFF
             -DCMAKE_BUILD_TYPE=Release
      - name: Compiler l'application
        run: cmake --build build --target VoiceLiveApp -j"$(nproc)"
      - name: Publier l'exécutable en artefact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceLiveApp-linux
          path: build/app/VoiceLiveApp_artefacts/**
          if-no-files-found: error
