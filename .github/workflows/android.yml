# SPDX-License-Identifier: MIT
# Construit un APK Android (debug) via le chemin officiel JUCE : Projucer
# exporte un projet Android Studio, Gradle compile l'APK.
#
# ⚠️ Pipeline « itération 1 » : versions (NDK, Gradle, build-tools) et options
# JUCE Android peuvent demander quelques ajustements sur le runner réel avant
# d'obtenir un build vert. L'APK produit est debug-signé (sideload uniquement).
name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - "claude/audio-recording-app-feasibility-g7nde9"
      - "claude/android-crashes-ui-fix-ycyyth"
    paths:
      - "app/**"
      - "core/**"
      - "dsp/**"
      - "engine/**"
      - "VoiceLivePro.jucer"
      - ".github/workflows/android.yml"

jobs:
  apk:
    name: Build APK (debug)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Dépendances hôte (build du Projucer/juceaide)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libcurl4-openssl-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev \
            libxrandr-dev libxrender-dev libgl1-mesa-dev libglu1-mesa-dev mesa-common-dev

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Composants SDK/NDK
        run: |
          yes | sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125" \
            "cmake;3.22.1"

      - name: Récupérer JUCE 8.0.4
        run: git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git juce

      - name: Construire le Projucer
        run: |
          cmake -S juce -B juce-build -DJUCE_BUILD_EXTRAS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build juce-build --target Projucer -j"$(nproc)"

      - name: Exporter le projet Android (Projucer)
        run: |
          PROJUCER="$(find juce-build -name Projucer -type f -perm -u+x | head -1)"
          echo "Projucer: $PROJUCER"
          "$PROJUCER" --set-global-search-path linux defaultJuceModulePath "$PWD/juce/modules"
          "$PROJUCER" --resave VoiceLivePro.jucer

      - name: Garantir la permission micro (RECORD_AUDIO)
        # androidMicNeeded n'injecte pas la permission de façon fiable : on
        # l'ajoute directement dans le manifeste généré (avant Gradle). Le build
        # ÉCHOUE si la permission est absente → si vert, RECORD_AUDIO est présent.
        run: |
          MANIFEST="$(find Builds/Android -name AndroidManifest.xml | head -1)"
          echo "Manifeste : $MANIFEST"
          if ! grep -qi "RECORD_AUDIO" "$MANIFEST"; then
            sed -i '0,/<application/{s|<application|<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <application|}' "$MANIFEST"
            echo "RECORD_AUDIO injecté dans le manifeste"
          fi
          echo "----- permissions déclarées -----"
          grep -i "uses-permission" "$MANIFEST"
          echo "---------------------------------"
          grep -qi "RECORD_AUDIO" "$MANIFEST" \
            && echo "OK : RECORD_AUDIO présent" \
            || { echo "ÉCHEC : RECORD_AUDIO absent"; exit 1; }

      - name: Installer le keystore debug stable
        # IMPORTANT : keystore committé (ci/debug.keystore) → tous les APK ont la
        # MÊME signature, donc s'installent par-dessus l'APK précédent. Sinon
        # (keystore généré à chaque build) Android refuse la mise à jour.
        run: |
          mkdir -p ~/.android
          cp ci/debug.keystore ~/.android/debug.keystore

      - name: Diagnostic du projet généré (sources & toolchain)
        # Aide à repérer en amont un .cpp absent du .jucer (erreur de lien) ou un
        # mauvais NDK. S'exécute toujours, avant Gradle.
        run: |
          echo "::group::Toolchain"
          echo "NDK installés : $(ls "$ANDROID_SDK_ROOT/ndk" 2>/dev/null || echo '?')"
          echo "::endgroup::"
          echo "::group::Sources C++ référencées par le projet Android généré"
          find Builds/Android -name CMakeLists.txt \
            -exec grep -hoE "[A-Za-z0-9_/]+\.cpp" {} \; | sort -u || true
          echo "::endgroup::"

      - name: Build Gradle (assembleDebug)
        working-directory: Builds/Android
        run: |
          chmod +x ./gradlew || true
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 \
            | tee "$GITHUB_WORKSPACE/gradle-build.log"

      - name: Diagnostic en cas d'échec (erreurs natives ciblées)
        # La vraie erreur clang/ninja est noyée dans la stacktrace Gradle.
        # On la ré-affiche seule, à la fin du log, pour un diagnostic immédiat.
        if: failure()
        run: |
          echo "::group::Erreurs de compilation/lien natives"
          grep -nE "error:|FAILED:|undefined (symbol|reference)|ninja: build stopped|fatal error" \
            "$GITHUB_WORKSPACE/gradle-build.log" \
            || echo "Aucune ligne 'error:' détectée — voir l'artefact android-debug-logs."
          echo "::endgroup::"
          echo "::group::Logs natifs CMake/.cxx (extraits)"
          while IFS= read -r f; do
            echo "----- $f -----"
            tail -n 40 "$f"
          done < <(find Builds/Android -path "*/.cxx/*" -name "*.log" 2>/dev/null) || true
          echo "::endgroup::"

      - name: Archiver les logs de diagnostic (échec uniquement)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-logs-r${{ github.run_number }}
          path: |
            gradle-build.log
            Builds/Android/**/.cxx/**/*.log
            Builds/Android/**/AndroidManifest.xml
            Builds/Android/**/CMakeLists.txt
          if-no-files-found: warn

      - name: Publier l'APK (nom unique = numéro de run + commit)
        uses: actions/upload-artifact@v4
        with:
          name: VoiceLivePro-r${{ github.run_number }}-${{ github.sha }}
          path: Builds/Android/**/outputs/apk/**/*.apk
          if-no-files-found: error
